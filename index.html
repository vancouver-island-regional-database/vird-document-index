<script>
        window.addEventListener('DOMContentLoaded', (event) => {
            // 1. Initialize your existing PagefindUI exactly as before
            new PagefindUI({ 
                element: "#search", 
                showSubResults: false, 
                showEmptyFilters: true, 
                processResult: function (result) {
                    if (result.meta) {
                        if (result.meta.pdf_url) { 
                            result.url = result.meta.pdf_url; 
                            delete result.meta.pdf_url;
                        }
                        if (result.meta.jurisdiction) {
                            let customPill = `<span style="background-color: #FCBA19; color: #003366; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px; display: inline-block; vertical-align: middle;">${result.meta.jurisdiction}</span>`;
                            result.excerpt = customPill + result.excerpt;
                            delete result.meta.jurisdiction;
                        }
                    }
                    return result;
                }
            });

            // 2. Attach a listener to show/hide the CSV button when the user types
            setTimeout(() => {
                const searchInput = document.querySelector('.pagefind-ui__search-input');
                const downloadBtn = document.getElementById('downloadCsvBtn');

                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        if (e.target.value.trim().length > 1) {
                            downloadBtn.style.display = "block";
                        } else {
                            downloadBtn.style.display = "none";
                        }
                    });
                }
            }, 500); // 500ms delay ensures Pagefind has finished building the search box first
        });

        // 3. Force PDF Results to Open in a New Tab
        // This intercepts any click on a search result and adds the target="_blank" attribute
        document.addEventListener('click', function(e) {
            const resultLink = e.target.closest('.pagefind-ui__result-link');
            if (resultLink) {
                resultLink.setAttribute('target', '_blank');
                resultLink.setAttribute('rel', 'noopener noreferrer');
            }
        });

        // 4. The Headless Parallel Search Function for CSV Export
        async function exportSearchToCSV() {
            const searchInput = document.querySelector('.pagefind-ui__search-input');
            const query = searchInput ? searchInput.value.trim() : "";
            
            if (!query) return;

            const downloadBtn = document.getElementById('downloadCsvBtn');
            const originalText = downloadBtn.innerText;
            
            // Visual feedback that the export is working
            downloadBtn.innerText = "COMPILING CSV...";
            downloadBtn.style.backgroundColor = "#FCBA19";
            downloadBtn.style.color = "#003366";

            // Run a parallel headless search to get all data points
            const pagefind = await import("/pagefind/pagefind.js");
            const search = await pagefind.search(query);
            
            if (!search || search.results.length === 0) {
                alert("No results found to export.");
                downloadBtn.innerText = originalText;
                downloadBtn.style.backgroundColor = "#003366";
                downloadBtn.style.color = "#FFFFFF";
                return;
            }

            // Await the extraction of all result metadata payloads
            const allData = await Promise.all(search.results.map(r => r.data()));

            // Build standard CSV format
            const headers = ["Document Title", "Source URL", "Jurisdiction", "Document Date"];
            const rows = allData.map(data => {
                const title = (data.meta.title || 'Untitled').replace(/"/g, '""');
                const url = data.meta.pdf_url || data.url || '';
                const jurisdiction = (data.filters && data.filters.Jurisdiction) ? data.filters.Jurisdiction.join(' | ').replace(/"/g, '""') : 'Unknown';
                const date = data.meta.date || 'N/A';
                return `"${title}","${url}","${jurisdiction}","${date}"`;
            });

            const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows].join("\n");
            const encodedUri = encodeURI(csvContent);
            
            // Trigger local browser download
            const downloadAnchor = document.createElement("a");
            downloadAnchor.setAttribute("href", encodedUri);
            downloadAnchor.setAttribute("download", `VIRD_Export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);

            // Reset button aesthetics
            downloadBtn.innerText = originalText;
            downloadBtn.style.backgroundColor = "#003366";
            downloadBtn.style.color = "#FFFFFF";
        }
    </script>
