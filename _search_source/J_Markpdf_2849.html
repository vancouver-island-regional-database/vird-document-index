My suggestions for the New curriculum outline:
1) Mirror a universities outline of a class.
—Athe beginning of each class explain and give each student a syllabus for them to follow. In the syllabus explain what
is asked of them —datesand times of each class -what is being covered each day, the chapter or test.
-what and when each assignments are and dues dates, what the weight of the grade it holds.
-when are the tests and what chapters are being examined, what the weight of the grade it holds.
-lay everything out. Plagiarism, grade breakdown, due dates, assignments description...everything -Including help hours
2) Then you leave it in the students hand. They know when everything happens. Stop taking attendance and let them
choice when they come to class. if they miss a dead line tough for them. if they miss a test, too bad you had the
information.

3) They want to be adults, let them. There has been too much hand holding in the last 10 years. The world is a mean
place give them a taste. it willget them ready for life. If a teacher needs them to attend class then weight attendance
appropriately as part of their grade. Make our kids countable for their actions. Get them ready for the real world.
4) Give the teachers the power to teach and structure their class in the manner they feel is suitable for the best outcome
for their students success. While meeting the above minimum requirements for graduation.

I hope that my bluntness is helpful. Our children are smarter than we think and they need to be treated likeyoung
adults, with respect and faith that they can do what is asked of them. Hand holding is good for leading but not for
growing.
