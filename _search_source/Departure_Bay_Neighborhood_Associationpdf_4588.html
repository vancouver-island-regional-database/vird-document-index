Re: Departure Bay School Closure

We have received concerns from people in our neighbourhood regarding the closure of
Departure Bay School. in reviewing the facilities plan, we are still left with the following
questions specific to Departure Bay:
1. The plan talks about an optimum elementary school size of 200 400 students. The
population of Departure Bay Elementary is shown currently at 164, projected to
—

increase to 195 by 2022.

With this number being so close to the optimum size, we are wondering ifthe
plan has taken into account the magnitude of new developments that are in the
planning stages along Hammond Bay Road within the current Departure Bay
catchment area. If it has not, it would seem that the school could very well
reach the desirable optimum size within the next few years.
In addition, many of the other schools that are being closed are significantly
below this optimum range (e.g. As few as 60 or 70 in some cases). We are
wondering why Departure Bay, with higher numbers and an increasing
population, has been targeted for closure?
in the longer term, Nanaimo’s Official Community Plan shows a high density
Urban Node proposed for the currently undeveloped area to the north and west
of the Linley Valley. When this happens it could put extra pressure on all of the
surrounding schools Departure Bay being the one immediately to the south.
With this longer term uncertainty in population growth in the area, how much
thought has been given to trying to maintain all of the surrounding schools at
this point and possibly realigning the catchment areas slightly to provide a more
equitable distribution in enrolments? Additionally, we note that the Ministry of
Education has a provision for the School District to base its enrollment forecasts

2. We notice that, looking at the current catchment areas and with Hammond Bay being
French immersion, that the next school for students is very far north, i.e. Frank J.,Ney. Is
it reasonable for kids living in the Hammond Bay/Stevenson Point area to travel this far
to a school?
3. The Facility Condition Index shows that Departure Bay School is in the best condition of

any of the surrounding schools. Considerable upgrading (seismic and other) has already
occurred at Departure Bay in recent years. Does it make economic sense to be closing
Departure Bay School and then upgrading other schools?
4. The bulk of the public consultation seems to be aimed at parents.

There has been no
direct contact with those living in the immediate neighbourhood of schools proposed
for closure. There is a great deal of concern as to what will happen to the surplus school
properties and the potential impacts on land values. How is the school district
proposing to consult with surrounding neighbours? is there a plan forthe disposal of the
Departure Bay property should the school close?

We would appreciate you addressing these points so that we may share them with our
members. If you would prefer to meet with representatives of the association in person, please
let us know and we can set up an appointment with you.
Yours sincerely,

2015 ADDITIONALCOMMENTS

The proposal to close Departure Bay School seems to have been mainly founded on the
supposition that the enrollment will stay below the minimum optimum population of 200
students throughout the 10 year life of the Plan. We question the accuracy of the enrollment
projections provided in the Plan. For example, the enrollment at the school for 2014-2015 is
189 students, significantly exceeding the 164 students mentioned in the Facilities plan for
2013-2014. The current enrollment is already very near the maximum figure of 195 predicted
in the Plan. The Plan however predicted this figure would not be reached until 2022. We are
almost at the projected 2022 population eight years ahead of time.
Consolidating Departure Bay and Cilaire Schools into a new Cilaire facility would appear to
have the potential of creating a very large school, with an enrollment potentially nearing the
maximum desirable population of 400 pupils, as identified in the Plan. Has any consideration
been given to size of facility that will be required at Cilaire and to whether the property at
Cilaire is suitable to accommodate it?

The recent rebranding of Departure Bay School as an Ecological center and a Science Center
has brought widespread attention and interest in the facility. Considering the current School
Board has encouraged this initiative by granting the school Charter Status as an Eco School it
would be very disappointing to see it closed in the near future, as recommended in the old
Facilities Plan. As a result of this new designation the school has the potential of attracting
even more students.
