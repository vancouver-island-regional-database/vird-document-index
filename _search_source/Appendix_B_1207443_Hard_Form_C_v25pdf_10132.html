7.

ADDITIONAL OR MODIFIED TERMS:

7.1

The Standard Charge Terms ST020098 provide in section 1.1 that the following terms are as
defined in the General Instrument Part 1:

7.2

(a)

The Area of the Works. The “Area of the Works” means that portion of the Land located
within 3 metres of either side of the centre of the alignment of the Works.

(b)

The Works. The “Works” means:
(i)

as it relates to the rights and responsibilities of B.C. Hydro, all things and
components, in any combination and using any type of technology or means,
necessary or convenient for the purposes of transmitting and distributing
electricity and for the purpose of telecommunications, including underground
lines, cables, conduits and pipes of every kind, together with access nodes,
cabinets, all ancillary appliances and fittings, above ground or underground
transformers, including any associated protective installations, and related works;
and

(ii)

as it relates to the rights and responsibilities of TELUS, all things and
components, in any combination and using any type of technology or means,
necessary or convenient for the purpose of telecommunications and data
transmission, including underground lines, cables, conduits and pipes of every
kind, together with access nodes, cabinets, all ancillary appliances and fittings,
above ground or underground transformers, including any associated protective
installations, and related works.

The Standard Charge Terms ST020098 are amended by the addition of the following section:
“6.4

As this Agreement relates to the rights and responsibilities of TELUS, the provisions
herein are subject to the provisions (including regulations) of the Telecommunications
Act S.C. 1993, c.38 and the Canadian Radio-Television and Telecommunications Act
R.S.C. 1985, c.C-22 and their successive legislation as well as any rulings, regulations,
tariffs or other directives of the Canadian Radio-Television and Telecommunications
Commission.”
